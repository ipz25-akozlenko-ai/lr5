<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Image Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header mb-4 shadow-sm">
        <h1 class="display-4 fw-bold">Image Gallery</h1>
    </header>

    <main class="container">
        <section class="mb-5">
            <h2 class="text-center mb-4 fw-bold text-dark">Nature</h2>
            
            <div class="row g-4">
                
                <div class="col-12 col-md-4 fade-in-up delay-1">
                    <figure class="m-0">
                        <div class="img-wrapper rounded overflow-hidden shadow-sm">
                            <img src="https://picsum.photos/id/1015/600/600" class="gallery-img w-100" alt="Гора і озеро" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="openModal(this.src)">
                        </div>
                        <figcaption class="text-center mt-2 text-muted">Nature</figcaption>
                    </figure>
                </div>
                <div class="col-12 col-md-4 fade-in-up delay-1">
                    <figure class="m-0">
                        <div class="img-wrapper rounded overflow-hidden shadow-sm">
                            <img src="https://picsum.photos/id/1016/600/600" class="gallery-img w-100" alt="Гори" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="openModal(this.src)">
                        </div>
                        <figcaption class="text-center mt-2 text-muted">Nature</figcaption>
                    </figure>
                </div>
                <div class="col-12 col-md-4 fade-in-up delay-1">
                    <figure class="m-0">
                        <div class="img-wrapper rounded overflow-hidden shadow-sm">
                            <img src="https://picsum.photos/id/1020/600/600" class="gallery-img w-100" alt="Олень" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="openModal(this.src)">
                        </div>
                        <figcaption class="text-center mt-2 text-muted">Nature</figcaption>
                    </figure>
                </div>

                <div class="col-12 col-md-5 fade-in-up delay-2">
                    <figure class="m-0">
                        <div class="img-wrapper rounded overflow-hidden shadow-sm">
                            <img src="https://picsum.photos/id/1018/800/600" class="gallery-img w-100" alt="Ліс" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="openModal(this.src)">
                        </div>
                        <figcaption class="text-center mt-2 text-muted">Nature</figcaption>
                    </figure>
                </div>
                <div class="col-12 col-md-7 fade-in-up delay-2">
                    <figure class="m-0">
                        <div class="img-wrapper rounded overflow-hidden shadow-sm">
                            <img src="https://picsum.photos/id/1019/1000/600" class="gallery-img w-100" alt="Водоспад" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="openModal(this.src)">
                        </div>
                        <figcaption class="text-center mt-2 text-muted">Nature</figcaption>
                    </figure>
                </div>

                <div class="col-12 col-md-8 fade-in-up delay-3">
                    <figure class="m-0">
                        <div class="img-wrapper rounded overflow-hidden shadow-sm">
                            <img src="https://picsum.photos/id/1021/1000/600" class="gallery-img w-100" alt="Дерева в полі" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="openModal(this.src)">
                        </div>
                        <figcaption class="text-center mt-2 text-muted">Nature</figcaption>
                    </figure>
                </div>
                <div class="col-12 col-md-4 fade-in-up delay-3">
                    <figure class="m-0">
                        <div class="img-wrapper rounded overflow-hidden shadow-sm">
                            <img src="https://picsum.photos/id/1022/600/600" class="gallery-img w-100" alt="Квіткове поле" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="openModal(this.src)">
                        </div>
                        <figcaption class="text-center mt-2 text-muted">Nature</figcaption>
                    </figure>
                </div>

            </div>

            <div class="text-center mt-5 fade-in-up delay-4">
                <button class="btn btn-kupita px-5 py-2 fs-5">Kupita</button>
            </div>
        </section>
    </main>

    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-header border-0 pb-0 position-absolute top-0 end-0 z-3">
                    <button type="button" class="btn-close btn-close-white fs-4 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center p-0">
                    <img src="" id="fullSizeImage" class="img-fluid rounded shadow-lg" alt="Full image">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function openModal(imageSrc) {
            document.getElementById('fullSizeImage').src = imageSrc;
        }
    </script>
</body>
</html>
